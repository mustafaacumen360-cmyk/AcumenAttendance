<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1117; --paper: #f5f3ee; --accent: #d4400a;
    --mid: #6b6660; --card: #ffffff; --border: #e2ddd8;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%; max-width: 420px;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }
  .card-header {
    background: var(--ink);
    padding: 28px 28px 28px;
    position: relative;
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 60px; height: 3px;
    background: var(--accent);
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: #fff; line-height: 1.2;
  }
  .card-body { padding: 28px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 8px;
  }
  input[type="tel"] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; color: var(--ink);
    background: #fff;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
  }
  input[type="tel"]:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 15px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 3px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s; margin-top: 8px;
  }
  .btn:hover { background: #1e2330; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg {
    background: #fff0ee; border: 1px solid #ffc9bf;
    border-radius: 3px; padding: 12px 16px;
    font-size: 13px; color: var(--accent);
    margin-top: 12px; display: none; line-height: 1.5;
  }
  .error-msg.visible { display: block; }
  .state-loading { display: none; }
  .state-loading.active { display: block; }
  .state-success { display: none; text-align: center; padding: 40px 28px; }
  .state-success.active { display: block; }
  .state-duplicate { display: none; text-align: center; padding: 40px 28px; }
  .state-duplicate.active { display: block; }
  .checkmark {
    width: 56px; height: 56px; background: var(--ink);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center; margin: 0 auto 20px;
  }
  .checkmark svg { width: 26px; height: 26px; }
  .warn-icon {
    width: 56px; height: 56px; background: #b45309;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 24px;
  }
  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--ink); margin-bottom: 8px;
  }
  .success-sub { font-size: 14px; color: var(--mid); line-height: 1.6; }
  .success-name { font-weight: 600; color: var(--accent); }
  .dot-loader {
    display: flex; justify-content: center;
    gap: 6px; padding: 24px 0;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--ink); border-radius: 50%;
    animation: bounce 0.9s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-8px); opacity: 1; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="brand">Acumen GATE Academy</div>
    <div class="card-title">Mark Your<br>Attendance</div>
  </div>

  <div class="card-body" id="formState">
    <div class="field">
      <label>Your Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="Enter phone number"
        maxlength="15" oninput="onInput()" onkeydown="onKey(event)" />
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn" id="submitBtn" disabled onclick="submitForm()">Mark Attendance</button>
  </div>

  <div class="state-loading" id="loadingState">
    <div class="dot-loader">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="state-success" id="successState">
    <div class="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Attendance Marked</div>
    <div class="success-sub">
      <span class="success-name" id="successName"></span><br>
      your attendance has been recorded.
    </div>
  </div>

  <div class="state-duplicate" id="duplicateState">
    <div class="warn-icon">⚠</div>
    <div class="success-title">Already Marked</div>
    <div class="success-sub">
      <span class="success-name" id="dupName"></span><br>
      your attendance was already recorded for today.
    </div>
  </div>
</div>

<script>
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFsZHidHzFcDu4aJeaRzBgWyHO8AQ-teo4v-AXPV_aFqzjQTo7WnAuyw1S0kV-fol/exec";

  // FIX: prevent double-submit
  var isSubmitting = false;

  function onInput() {
    var val = document.getElementById('phoneInput').value.trim();
    document.getElementById('submitBtn').disabled = val.length < 10;
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function onKey(e) { if (e.key === 'Enter') submitForm(); }

  function jsonp(url, cb) {
    var id = 'jsonp_' + Date.now();
    window[id] = function(data) {
      try { document.body.removeChild(document.getElementById(id)); } catch(err) {}
      delete window[id]; cb(data);
    };
    var s = document.createElement('script');
    s.id = id;
    s.src = url + '&callback=' + id;
    s.onerror = function() {
      try { document.body.removeChild(s); } catch(err) {}
      delete window[id]; cb(null);
    };
    document.body.appendChild(s);
  }

  function submitForm() {
    // FIX: prevent double-tap
    if (isSubmitting) return;
    var phone = document.getElementById('phoneInput').value.trim();
    if (phone.length < 10) return;

    isSubmitting = true;
    document.getElementById('formState').style.display = 'none';
    document.getElementById('loadingState').classList.add('active');

    // FIX: 20 second timeout so spinner doesn't run forever
    var timedOut = false;
    var timeout = setTimeout(function() {
      timedOut = true;
      isSubmitting = false;
      document.getElementById('loadingState').classList.remove('active');
      showForm("Request timed out. Please check your connection and try again.");
    }, 20000);

    jsonp(APPS_SCRIPT_URL + '?action=submitAttendance&phone=' + encodeURIComponent(phone),
      function(data) {
        if (timedOut) return; // arrived after timeout, ignore
        clearTimeout(timeout);
        isSubmitting = false;
        document.getElementById('loadingState').classList.remove('active');
        if (!data) { showForm("Something went wrong. Please try again."); return; }
        if (!data.success) { showForm(data.error || "Something went wrong."); return; }
        if (data.duplicate) {
          document.getElementById('dupName').textContent = data.studentName;
          document.getElementById('duplicateState').classList.add('active');
        } else {
          document.getElementById('successName').textContent = data.studentName;
          document.getElementById('successState').classList.add('active');
        }
      }
    );
  }

  function showForm(msg) {
    document.getElementById('formState').style.display = 'block';
    var el = document.getElementById('errorMsg');
    el.textContent = msg; el.classList.add('visible');
  }
</script>
</body>
</html>
